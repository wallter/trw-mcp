# trw-mcp canonical MCP server allowlist (PRD-INFRA-SEC-001 FR-1 / FR-8 Tier 1).
#
# This file is the TRW-maintainer-signed canonical allowlist shipped with every
# trw-mcp release. Entries here are trusted at `trust_level: verified`.
#
# To extend for a specific project, DO NOT edit this file. Instead create:
#
#     $PROJECT/.trw/mcp_servers.local.yaml
#
# with the same schema. Operator overlay rules (enforced by
# `trw_mcp.security.mcp_registry.load_allowlist`):
#
#   1. The overlay MAY add new servers not present in this file.
#   2. The overlay MAY tighten a canonical entry (same-or-stricter trust_level).
#   3. The overlay MAY NOT downgrade the trust_level of a canonical entry.
#      Such downgrades are logged and rejected at load time.
#
# Signature verification is currently in OBSERVE mode (v1). The `signature`
# field is carried through for schema stability; real Ed25519 verification is
# activated by a later rollout wave per PRD §8.

version: 1
signing_algorithm: ed25519
servers:
  - name: trw-mcp
    url_or_command: stdio://trw-mcp
    signer: trw-maintainer
    signature: "sha256:trw-mcp-self-loopback-placeholder"
    trust_level: verified
    capabilities:
      - trw_session_start
      - trw_learn
      - trw_recall
      - trw_checkpoint
      - trw_deliver
      - trw_build_check
  - name: context7
    url_or_command: stdio://context7
    signer: trw-maintainer
    signature: "sha256:context7-trw-signed-placeholder"
    trust_level: verified
    capabilities:
      - resolve-library-id
      - get-library-docs
