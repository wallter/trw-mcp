# TRW Framework — trw-mcp project configuration
# Values here override TRWConfig defaults (env vars TRW_* take highest priority).

task_root: docs
debug: false
source_package_name: trw_mcp
source_package_path: src/trw_mcp
tests_relative_path: tests
prds_relative_path: docs/requirements-aare-f/prds

# Embedding-powered hybrid recall (BM25 + vector + RRF fusion)
embeddings_enabled: true
retrieval_embedding_model: "all-MiniLM-L6-v2"

# Platform backend connectivity (fan-out: writes go to all, reads use first-success)
platform_urls:
  - "https://api.trwframework.com"
  - "http://localhost:8000"
platform_api_key: "trw_dev_admin_key_2026"
platform_telemetry_enabled: true
installation_id: "trw-mcp-dev"
