id: L-525396a9
summary: 'Lambda deploy: >50MB zip requires S3 intermediary, backend has no requirements.txt'
detail: 'Two deployment gotchas: (1) Lambda direct zip upload limit is 50MB — the
  backend package with all deps is ~52MB, so must upload to S3 first then use --s3-bucket/--s3-key
  flags. Created s3://trw-backend-deploy for this. (2) The backend pyproject.toml
  lacks packages config so pip install . fails with setuptools discovery error — install
  deps explicitly by listing them in a subprocess call rather than using pip install
  .[postgres]. Always verify key deps exist in the package (fastapi, mangum, sqlalchemy,
  pydantic) before deploying.'
