id: L-64ef8444
summary: 'Multi-backend fan-out pattern: writes to all URLs, reads use first-success'
detail: 'platform_urls is a list field in TRWConfig with effective_platform_urls property
  that merges singular platform_url + platform_urls (deduped, normalized). Write paths
  (sender.py, publisher.py) fan out to ALL URLs — success if any succeed. Read paths
  (remote_recall.py, auto_upgrade.py) iterate URLs with first-success — return on
  first 2xx response. This enables projects to write to both local and remote backends
  while reads prefer the fastest available. Config example: platform_urls: ["https://api.trwframework.com",
  "http://localhost:8000"]. Remote-only projects just list the remote URL.'
