# Behavioral directives — single source of truth for all injection channels.
# Read by: CLAUDE.md template, SessionStart hook, MCP instructions.
# Framing: value-oriented (what it gives you) > threat-oriented (what you lose).
# Research basis: Anthropic context engineering, motivation framing, self-interest framing.
# PRD-FIX-078: Tool references use {tool:trw_X} placeholders — renderer expands
# them per-profile so claude-code sees mcp__trw__trw_X while opencode sees bare.
directives:
  - "Your primary role is orchestration — for non-trivial tasks, delegating to subagents or Agent Teams produces better results than direct implementation because focused context windows enable deeper work, shard self-review catches integration gaps, and you keep strategic oversight of the full picture"
  - "`{tool:trw_session_start}(query='your task domain')` loads your prior learnings and recovers any active run — pass a query string for focused hybrid recall of domain-relevant learnings, or omit for default high-impact recall"
  - "`{tool:trw_status}()` shows your current phase, completed work, and next steps — call it when resuming so you pick up where you left off instead of redoing work"
  - "`{tool:trw_init}(task_name)` creates your run directory and event log — call it for new tasks so checkpoints and progress tracking work"
  - "`{tool:trw_checkpoint}(message)` saves your implementation progress — call it after each milestone so you can resume here if context compacts, instead of re-implementing from scratch"
  - "`{tool:trw_learn}(summary, detail)` records discoveries for all future sessions — call it when you hit errors or find gotchas so no agent repeats your mistakes"
  - "`{tool:trw_claude_md_sync}()` promotes your best learnings into CLAUDE.md — call it at delivery so the next session starts with your insights built in"
  - "For quick tasks without a run: `{tool:trw_recall}()` gives you relevant prior learnings at the start, `{tool:trw_learn}()` saves new ones for next time"
  - "`{tool:trw_deliver}()` persists everything in one call (reflect + checkpoint + CLAUDE.md sync + index sync) — without it, your session's learnings are invisible to future agents"
