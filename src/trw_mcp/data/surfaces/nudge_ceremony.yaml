# Ceremony nudge pool — low-urgency ceremony step reminders.
# PRD-CORE-129: Migrated from Python string constants to YAML for maintainability.
# Keyed by ceremony step name for direct lookup.
messages:
  session_start:
    text: "Load prior context with trw_session_start() — 1 second, avoids re-discovery."
  checkpoint:
    text: "Save progress with trw_checkpoint() — protects against context loss."
  build_check:
    text: "Run project-native validation, then record its observed result with trw_build_check(tests_passed, test_count, failure_count, static_checks_clean, scope). The tool reports evidence; it does not run checks."
  review:
    text: "Invoke trw_review() on the current diff to surface logic gaps missed by self-review."
  deliver:
    text: "Persist session with trw_deliver() — your learnings become available to future sessions."
