# AI-facing messages — single source of truth for TRW messaging to AI instances.
# PRD-INFRA-012: Centralized AI-Facing Messaging Registry with Value-Oriented Framing.
#
# Framing principle: value-oriented (what it gives you) > prescriptive (MUST/ALWAYS/NEVER).
# Research basis: Anthropic Claude 4.6 best practices, context engineering guide,
#   Constitutional AI — understanding enables generalization to novel situations.
#
# Consumed by:
#   - Python: trw_mcp.prompts.messaging loads this file via get_message()
#   - Deployed to user projects as .trw/context/messages.yaml via bootstrap
#
# Format: simple YAML strings. Avoid block scalars (> |) for shell grep-ability.
# Use {placeholder} for runtime substitution via str.format().

# --- MCP Server Instructions (server.py FastMCP constructor) ---
server_instructions: "TRW gives you engineering memory that persists across sessions — patterns, gotchas, and project knowledge that accumulate over time. Call {tool:trw_session_start}() first to load your prior learnings and any active run state. Pass a query for focused recall: {tool:trw_session_start}(query='auth patterns'). Read .trw/frameworks/FRAMEWORK.md — it defines the 6-phase execution model, exit criteria, formations, and quality gates that your tools implement. Re-read it after context compaction. Workflow: {tool:trw_session_start} -> work -> {tool:trw_learn} (discoveries) -> {tool:trw_deliver}. Without {tool:trw_deliver}, your session's progress isn't checkpointed and maintenance tasks don't run — future sessions start with less context."

# --- Ceremony Middleware Warning (prepended to tool responses when ceremony not run) ---
ceremony_warning: "{tool:trw_session_start}() has not been called yet for this session.\nWithout it, you are working without:\n  - Prior session learnings (patterns and gotchas that prevent re-work)\n  - Active run state (phase, progress, last checkpoint)\nCall {tool:trw_session_start}(query='your task domain') now — pass a query for focused recall, or call without args for default high-impact recall."

# --- Delegation Guidance (CLAUDE.md auto-generated section, session-start hint) ---
delegation_guidance: "Your primary role is orchestration — assess, delegate, verify, and preserve knowledge. For non-trivial tasks (2+ files), delegating to focused subagents or Agent Teams gives each agent a clean context window and enables the self-review checklist that catches most integration issues. Reserve direct implementation for trivial fixes (≤3 lines, 1 file). Default: subagents. Use Agent Teams when teammates need peer communication or tasks span 2+ modules."
