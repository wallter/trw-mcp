# --- MCP Server Instructions (server.py FastMCP constructor) ---
server_instructions: "TRW gives you engineering memory that persists across sessions — patterns, gotchas, and project knowledge that accumulate over time. Call trw_session_start() first to load your prior learnings and any active run state. Pass a query for focused recall: trw_session_start(query='auth patterns'). Workflow: trw_session_start -> work -> trw_learn (discoveries) -> trw_deliver. Without trw_deliver, your learnings from this session are lost to future agents."

# --- Ceremony Middleware Warning (prepended to tool responses when ceremony not run) ---
ceremony_warning: "trw_session_start() has not been called yet for this session.\nWithout it, you are working without:\n  - Prior session learnings (patterns and gotchas that prevent re-work)\n  - Active run state (phase, progress, last checkpoint)\nCall trw_session_start(query='your task domain') now — pass a query for focused recall, or call without args for default high-impact recall."

# --- Delegation Guidance (CLAUDE.md auto-generated section, session-start hint) ---
delegation_guidance: "Your primary role is orchestration — assess, delegate, verify, and preserve knowledge. For non-trivial tasks (2+ files), delegating to focused subagents or Agent Teams gives each agent a clean context window and enables the self-review checklist that catches 80%+ of integration issues. Reserve direct implementation for trivial fixes (≤3 lines, 1 file). Default: subagents. Use Agent Teams when teammates need peer communication or tasks span 2+ modules."
