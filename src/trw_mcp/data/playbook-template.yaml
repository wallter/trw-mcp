# playbook-template.yaml
#
# Canonical templates extracted from .claude/skills/trw-team-playbook/SKILL.md
# and .claude/skills/trw-sprint-team/SKILL.md to keep those SKILL.md files
# under their effective-LOC budgets (PRD-QUAL-074 FR04/FR05).
#
# Consumers (the two skills) reference sections by name:
#   "See template at trw-mcp/src/trw_mcp/data/playbook-template.yaml (section: X)"
#
# This file is checked into the public trw-mcp distribution (ip_tier: public).
# It contains no secrets and is safe to render into any instruction surface.

version: '1.0'

# ----------------------------------------------------------------------
# file-ownership: canonical shape for scratch/sprint-coordination/file_ownership.yaml
# ----------------------------------------------------------------------
file-ownership:
  description: >
    Shape of the file_ownership.yaml artifact produced by /trw-team-playbook.
    Every workstream has owns + test_owns + does_not_own (union of other
    workstreams' owns + test_owns). validation block confirms invariants.
  template: |
    # file_ownership.yaml -- generated by /trw-team-playbook
    version: '1.0'
    generated: '{ISO 8601 timestamp}'
    sprint: '{sprint name}'
    workstreams:
      implementer-1:
        role: implementer
        owns:
          - src/trw_mcp/tools/example_tool.py
          - src/trw_mcp/state/example_state.py
        test_owns:
          - tests/test_example_tool.py
        does_not_own:
          - src/trw_mcp/tools/other_tool.py
          - tests/test_other_tool.py
      tester-1:
        role: tester
        owns:
          - tests/test_integration_example.py
        does_not_own:
          - src/trw_mcp/tools/example_tool.py
      reviewer:
        role: reviewer
        owns: []
        read_only:
          - src/**
          - tests/**
    validation:
      no_overlap: true
      all_in_scope_files_assigned: true

# ----------------------------------------------------------------------
# interface-contract: canonical shape for scratch/sprint-coordination/interface-contract.yaml
# ----------------------------------------------------------------------
interface-contract:
  description: >
    Shape of interface-contract.yaml. One contract per shared boundary between
    workstreams. Use Grep to verify real function signatures and Pydantic model
    fields before writing them -- do not fabricate.
  template: |
    # interface-contract.yaml -- generated by /trw-team-playbook
    version: '1.0'
    generated: '{ISO 8601 timestamp}'
    contracts:
      - boundary: "implementer-1 -> tester-1"
        description: "Functions and models that tester-1 will call or validate"
        functions:
          - name: example_function
            module: src/trw_mcp/tools/example_tool.py
            signature: "def example_function(arg: str, config: TRWConfig) -> ExampleResult"
            notes: "Returns ExampleResult -- do not call with raw dict"
        schemas:
          - name: ExampleResult
            module: src/trw_mcp/models/run.py
            fields:
              - name: status
                type: str
                enum: [success, failure, skipped]
              - name: artifacts
                type: list[Path]
                required: true
        shared_paths:
          - .trw/config.yaml
        negative_constraints:
          - "DO NOT return raw dict -- use typed Pydantic model"
          - "DO NOT change ExampleResult field names without notifying tester-1"

# ----------------------------------------------------------------------
# playbook-sections: seven canonical sections of ws-{name}.md
# ----------------------------------------------------------------------
playbook-sections:
  section-1-identity-and-mission: |
    # Workstream Playbook: {name}

    **Role**: {role} | **Sprint**: {sprint name}
    **Model recommendation**: {frontier for review, balanced for implementation/testing, local-small for extraction}
    **Working Directory**: {absolute_worktree_path_or_"main worktree (repo root)"}

    Verify `pwd` matches your Working Directory before beginning any file edits. If your working directory does not match, run `cd {working_directory}` first.

    ## Mission

    {1-2 sentence purpose statement tied to sprint goals and assigned PRDs.
    Example: "Implement the observability hooks in PRD-CORE-031. Your work enables
    the tester to validate that all 14 hook events fire in the correct sequence."}

  section-2-file-ownership: |
    ## File Ownership

    You own these files exclusively -- only you may modify them:

    ### Source files
    - `src/trw_mcp/tools/example_tool.py`

    ### Test files
    - `tests/test_example_tool.py`

    ### DO NOT modify (owned by other workstreams)
    - `src/trw_mcp/tools/other_tool.py` -- owned by implementer-2
    - `tests/test_other_tool.py` -- owned by tester-1

  section-3-interface-contracts: |
    ## Interface Contracts

    ### What you provide to tester-1

    {Paste the relevant contract block from interface-contract.yaml in YAML code fence.}

    ### What you consume from implementer-2 (if applicable)

    {Paste the relevant contract block.}

    If the workstream is a reviewer or researcher with no contracts, write:
    "No interface contracts -- read-only role."

  section-4-tasks: |
    ## Tasks

    ### Task 1: Implement {FR-ID} -- {short description}

    **PRD**: PRD-{ID} | **Priority**: P{n}

    **What to build**: {2-3 sentence description of the concrete deliverable}

    **Acceptance criteria**:
    - [ ] {criterion 1}
    - [ ] {criterion 2}

    **Files to modify**: `src/trw_mcp/tools/example_tool.py`

    ---

    ### Task 2: ...

    List tasks in priority order (P0 first). Each task maps to exactly one FR ID.

  section-4-tester-prefix: |
    ## CONTEXT ISOLATION

    Do NOT read implementation source files before writing your tests. Read ONLY:
    1. PRD FR acceptance criteria from the execution plan
    2. Test skeleton functions from the test skeleton files

    Your tests must verify the specification, not the implementation. Write tests that would pass for ANY correct implementation, not just the one your workstream wrote.

  section-4-implementer-coord-addendum: |
    ### Test Integration
    - Implement against the failing tests in the test skeleton files
    - Do NOT modify test files — make the tests pass by implementing correct behavior
    - If a test seems wrong, message the tester before modifying it

  section-5-quality-standards: |
    ## Quality Standards

    ### Self-review checklist (complete before marking any task done)

    1. Re-read assigned FRs -- verify every requirement is implemented, not just the easy ones
    2. Check integration -- new functions are imported and called from existing code
    3. Review your diff for DRY (no duplicated logic), KISS (minimum viable), SOLID (single responsibility)
    4. Run project-native validation, then record only its observed result with `trw_build_check(tests_passed=<bool>, test_count=<n>, failure_count=<n>, static_checks_clean=<bool|null>, scope="<exact command>")`
    5. Write a completion checkpoint: which FRs implemented, test count, integration points touched

    ### Test expectations

    - Coverage target: meet the project-configured coverage gate for touched code, or record an explicit rationale when no gate exists
    - All edge cases covered: empty inputs, missing files, invalid config
    - Project-native type/lint/static checks pass with no new errors when configured
    - Test file: nearest test location using the project's naming convention

  section-6-shard-protocol: |
    ## Shard Protocol (optional)

    Include only for implementer workstreams with 3+ tasks. Tester / reviewer
    / researcher playbooks omit this section.

    - Maximum 4 shards, launched in parallel in ONE message
    - Each shard gets a non-overlapping subset of your exclusive files
    - Shards write results to `scratch/ws-{name}/shards/shard-{id}/result.yaml`
    - You aggregate shard outputs after all complete
    - Shards MUST NOT spawn sub-shards (depth 1 max)

  section-7-coordination: |
    ## Coordination

    ### Message these workstreams when:

    - **tester-1**: when you change a function signature, model field, or file path they test
    - **reviewer** (if present): when a task is complete and ready for review

    ### Receive messages from:

    - **tester-1**: if tests reveal bugs in your implementation, fix them in your owned files
    - **orchestrator**: for task reassignment or priority changes

    ### If you discover a file conflict:

    STOP. Message the orchestrator immediately with: which file, which workstream you think owns it, what you needed to change.

    ### Reporting completion:

    When all your tasks are done, call `TaskUpdate` to mark each task `completed`, then message the orchestrator: "All tasks complete. Build check passed. Ready for shutdown."

    ### Completion Promise

    As your FINAL action before completing, output this exact text:

        SHARD_COMPLETE: {your-workstream-name} — all acceptance criteria verified

    This is a machine-readable completion signal for the orchestrator and any configured completion-gate adapter. Missing this signal triggers review feedback.

# ----------------------------------------------------------------------
# team-composition: default implementer/tester/reviewer counts by PRD count
# ----------------------------------------------------------------------
team-composition:
  description: >
    Default team sizing when the sprint doc does not assign roles explicitly.
  defaults:
    - prd_count: "1-2"
      implementers: 1
      testers: 1
      reviewers: 0
      total: 2
    - prd_count: "3-4"
      implementers: 2
      testers: 1
      reviewers: 0
      total: 3
    - prd_count: "5-6"
      implementers: 2
      testers: 1
      reviewers: 1
      total: 4
    - prd_count: "7+"
      implementers: 3
      testers: 1
      reviewers: 1
      total: 5

# ----------------------------------------------------------------------
# worktree-setup: shared guidance used by both skills
# ----------------------------------------------------------------------
worktree-setup:
  description: >
    Canonical recipe for preparing a per-workstream git worktree. Applied in
    /trw-sprint-team Step 6a (physical setup) and Step 7 (spawn prompt).
  recipe: |
    For each implementer workstream:

    1. Determine the branch name: `trw-{prd-id}-{role}` (lowercase, hyphenated).
       Example: `trw-core-095-implementer-1`.
    2. Choose a worktree path: `../worktree-{workstream-name}` (sibling of main repo).
    3. Create the worktree:
         git worktree add <worktree-path> -b <branch-name>
    4. Install dev deps inside the worktree so the workstream can run tests:
         cd <worktree-path> && pip install -e ".[dev]"
    5. Record the worktree path in the workstream's file_ownership.yaml entry
       under `working_directory`.
    6. In the spawn prompt, pass the absolute worktree path as the first line
       of the workstream's playbook so `pwd` verification succeeds before edits.

    Testers, reviewers, and researchers run from the main worktree (repo root);
    no separate worktree is created for them.

# ----------------------------------------------------------------------
# integration-review-prompt: standard Explore prompt for integration review
# ----------------------------------------------------------------------
integration-review-prompt: |
  You are the integration-review agent for sprint {SPRINT_NAME}.

  Scope:
  - Read the sprint doc at {SPRINT_DOC_PATH}.
  - Read the per-workstream playbooks under scratch/sprint-coordination/playbooks/.
  - Read the file_ownership.yaml and interface-contract.yaml artifacts.
  - Diff each workstream's owned files against origin/main.

  Check for:
  1. Boundary violations: workstream modified a file outside their `owns` set.
  2. Contract drift: function signature / Pydantic field changed without
     updating interface-contract.yaml.
  3. Missing wiring: new symbol defined but never imported from the
     integration point named in the PRD.
  4. Test-skeleton divergence: the skeleton test names survived but the
     assertions no longer match the PRD FR text.
  5. Stubs masquerading as complete: `pass`, `NotImplementedError`, or
     "TODO" inside a function whose playbook claims it was implemented.

  Output: a review.yaml artifact with one finding per issue, verdict
  pass / warn / block, and a summary of how many workstreams touched files
  outside their ownership set.

  Do NOT edit any source files -- this role is read-only.
