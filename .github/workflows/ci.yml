name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      # trw-memory is a private sibling repo during development.
      # Once published to PyPI, remove this step and the local install below.
      - name: Checkout trw-memory
        uses: actions/checkout@v4
        with:
          repository: wallter/trw-memory
          path: _trw-memory
          token: ${{ secrets.TRW_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./_trw-memory"
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Type check
        run: mypy --strict src/trw_mcp/

      - name: Test
        run: pytest tests/ -x --timeout=120 -q
