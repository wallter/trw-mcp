name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]  # 3.12+ excluded: sqlite-vec C extension segfaults on GH Actions runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install trw-memory>=0.4.0 || pip install git+https://github.com/wallter/trw-memory.git@main
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/
      - name: Type check
        run: mypy --strict src/trw_mcp/
      - name: Test
        run: pytest tests/ -x --timeout=120 -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
